services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_WS_URL: wss://chatwoot.nexia-bf.org/cable
        NEXT_PUBLIC_APP_NAME: NEXIA CRM Social
    container_name: nexia-crm-social
    restart: unless-stopped
    ports:
      - "3002:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.production
    environment:
      CHATWOOT_BASE_URL: http://host.docker.internal:3000
      CHATWOOT_ACCOUNT_ID: "1"
